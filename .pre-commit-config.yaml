repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3.12
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - types-redis
          - "sqlalchemy[mypy]"
          # Plan 01-02 adds modules that import structlog / sentry-sdk;
          # pre-commit's isolated mypy env needs them for --strict to pass.
          - structlog==26.1.0
          - "sentry-sdk[fastapi]==2.63.0"
          # Plan 01-03 adds app/config/checkpointer.py which imports
          # AsyncPostgresSaver from langgraph-checkpoint-postgres. The
          # version pin matches CONTEXT.md D-03.
          - langgraph-checkpoint-postgres==3.1.0
          # Plan 01-04 wires LLM factory + FastAPI app + /health.
          # mypy isolated env needs the ChatOpenAI wrapper, FastAPI,
          # httpx, asgi-correlation-id. Versions match pyproject.toml.
          - langchain-openai==1.3.3
          - fastapi==0.138.1
          - httpx==0.28.1
          - asgi-correlation-id==5.0.1
          # Plan 01-05 wires ARQ worker REDIS_URL via RedisSettings.from_dsn.
          - arq==0.28.0
          # Plan 02-01 introduces tenacity + pybreaker imports in
          # app/integrations/softseguros.py and app/integrations/_circuit.py.
          # mypy isolated env needs them for --strict (pattern from plans 01-02,
          # 01-04, 01-05). Versions match pyproject.toml.
          - tenacity==9.1.4
          - pybreaker==1.4.1
        args: [--strict, --explicit-package-bases]
        files: ^app/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
